# vvv THOG
name: Stage 5 GPU, DDP, and target geometry

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stage5-cpu-ddp:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install CPU dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install numpy
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Enforce Stage 5 source scope
        run: |
          set -euo pipefail
          git fetch origin master
          python - <<'PY'
          import subprocess
          changed = subprocess.check_output(
              ['git', 'diff', '--name-only', 'origin/master...HEAD'], text=True
          ).splitlines()
          allowed = (
              'sheet/', 'tests/', 'evidence/stage5_', 'docs/THOG2_Stage_5_',
              'train_thog2.py',
              '.github/workflows/stage4-ephemeral-inference.yml',
              '.github/workflows/stage5-gpu-ddp.yml',
          )
          unexpected = [path for path in changed if not any(
              path == prefix or path.startswith(prefix) for prefix in allowed
          )]
          if unexpected:
              raise SystemExit(f'unexpected Stage 5 paths: {unexpected}')
          protected = {'model.py', 'train.py', 'sample.py', 'configurator.py'}
          touched = sorted(protected.intersection(changed))
          if touched:
              raise SystemExit(f'Stage 5 touched protected runtime files: {touched}')
          print('\n'.join(changed))
          PY
      - name: Compile Stage 5 sources
        run: |
          python -m compileall -q \
            sheet \
            tests \
            train_thog2.py
      - name: Run Stage 1 regression
        run: python tests/run_sheet_stage1_tests.py --evidence /tmp/stage1.json
      - name: Run Stage 2 regression
        run: python tests/run_sheet_stage2_tests.py --evidence /tmp/stage2.json
      - name: Run Stage 3 regression
        run: python tests/run_sheet_stage3_tests.py --evidence /tmp/stage3.json
      - name: Run Stage 4 regression
        run: python tests/run_sheet_stage4_tests.py --evidence /tmp/stage4.json
      - name: Run Stage 5 CPU and two-rank DDP tests
        run: |
          mkdir -p evidence
          python tests/run_sheet_stage5_tests.py \
            --evidence evidence/stage5_cpu_ddp.json
      - name: Upload Stage 5 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage5-cpu-ddp-evidence
          path: evidence/stage5_cpu_ddp.json
          if-no-files-found: error
