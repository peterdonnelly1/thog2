name: PICTON apply pending fixes

on:
  push:
    branches:
      - BLOCK_enhancements_group
    paths:
      - scripts/picton_apply_pending_fixes.py

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: BLOCK_enhancements_group
          fetch-depth: 0
      - name: Apply guarded fixes
        run: python scripts/picton_apply_pending_fixes.py
      - name: Remove one-shot patch machinery
        run: |
          rm scripts/picton_apply_pending_fixes.py
          rm .github/workflows/picton_apply_pending_fixes.yml
      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "PICTON fix final regression expectations"
          git push origin HEAD:BLOCK_enhancements_group
