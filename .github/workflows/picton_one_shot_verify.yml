name: PICTON one-shot verify

on:
  push:
    branches:
      - BLOCK_enhancements_group
    paths:
      - scripts/picton_trigger_one_shot_verify.py

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: BLOCK_enhancements_group
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install CPU test dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet numpy pytest
          python -m pip install --quiet torch --index-url https://download.pytorch.org/whl/cpu
      - name: Compile and shell syntax
        run: |
          python -m compileall -q run_thog2_owt.py sheet tests
          find . -maxdepth 1 -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n
      - name: Run full regression suite
        shell: bash
        run: |
          set +e
          OMP_NUM_THREADS=1 MKL_NUM_THREADS=1 PYTHONPATH=. pytest -q > tests/picton_ci_last.log 2>&1
          status=$?
          set -e
          printf '%s\n' "$status" > tests/picton_ci_last_status.txt
      - name: Remove one-shot machinery and commit result
        run: |
          rm scripts/picton_trigger_one_shot_verify.py
          rm .github/workflows/picton_one_shot_verify.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "PICTON record one-shot full verification"
          git push origin HEAD:BLOCK_enhancements_group
