name: Apply basis-family plug-in refactor

on:
  push:
    branches:
      - remainder_architecture_enhancement
    paths:
      - .thog_apply_basis_family_refactor.py
      - .github/workflows/apply_basis_family_refactor.yml

permissions:
  contents: write

jobs:
  apply-test-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out remainder branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CPU test dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet numpy pytest
          python -m pip install --quiet torch --index-url https://download.pytorch.org/whl/cpu

      - name: Apply refactor
        run: python .thog_apply_basis_family_refactor.py

      - name: Compile Python sources
        run: python -m compileall -q run_thog2_owt.py sheet tests

      - name: Check shell syntax
        run: |
          find . -maxdepth 1 -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n

      - name: Check patch whitespace
        run: git diff --check

      - name: Run focused basis and wrapper regressions
        run: |
          python -m unittest \
            tests.test_basis_family_plugin_registry \
            tests.test_stage2_basis_kernel \
            tests.test_stage7_dct_basis_kernel \
            tests.test_stage7_dct_training_and_checkpoint \
            tests.test_stage7_dct_gpu \
            tests.test_stage8_wrapper_shell_syntax \
            tests.test_stage8_wrappers_and_run_config

      - name: Run full regression suite
        run: python -m unittest discover tests

      - name: Commit tested implementation
        run: |
          rm -f .thog_apply_basis_family_refactor.py
          rm -f .github/workflows/apply_basis_family_refactor.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Refactor basis families into plug-in modules'
          git push origin HEAD:remainder_architecture_enhancement
