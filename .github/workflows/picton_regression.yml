name: PICTON regression

on:
  push:
    branches:
      - BLOCK_enhancements_group
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Archive tested source snapshot
        run: tar --exclude=.git --exclude=picton-source.tgz -czf picton-source.tgz .

      - name: Upload tested source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: picton-source
          path: picton-source.tgz
          if-no-files-found: error
          retention-days: 7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CPU test dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet numpy pytest
          python -m pip install --quiet torch --index-url https://download.pytorch.org/whl/cpu

      - name: Compile Python sources
        run: python -m compileall -q run_thog2_owt.py sheet tests

      - name: Check shell syntax
        run: |
          find . -maxdepth 1 -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n

      - name: Run full regression suite
        id: pytest
        continue-on-error: true
        env:
          PYTHONPATH: .
        run: pytest -q > picton-pytest.log 2>&1

      - name: Upload pytest output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: picton-pytest-log
          path: picton-pytest.log
          if-no-files-found: error
          retention-days: 7

      - name: Print pytest output
        if: always()
        run: cat picton-pytest.log

      - name: Enforce pytest success
        if: steps.pytest.outcome != 'success'
        run: exit 1
