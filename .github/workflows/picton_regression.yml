name: PICTON regression

on:
  push:
    branches:
      - BLOCK_enhancements_group
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply pending THOG enhancement
        run: |
          if [[ -f .thog_apply.py ]]; then
            python .thog_apply.py
          fi

      - name: Archive tested source snapshot
        run: tar --exclude=.git -czf /tmp/picton-source.tgz .

      - name: Upload tested source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: picton-source
          path: /tmp/picton-source.tgz
          if-no-files-found: error
          retention-days: 7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CPU test dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet numpy pytest
          python -m pip install --quiet torch --index-url https://download.pytorch.org/whl/cpu

      - name: Compile Python sources
        run: python -m compileall -q run_thog2_owt.py sheet tests

      - name: Check shell syntax
        run: |
          find . -maxdepth 1 -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n

      - name: Run full regression suite
        id: pytest
        continue-on-error: true
        env:
          PYTHONPATH: .
        run: pytest -q > picton-pytest.log 2>&1

      - name: Upload pytest output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: picton-pytest-log
          path: picton-pytest.log
          if-no-files-found: error
          retention-days: 7

      - name: Print pytest output
        if: always()
        run: cat picton-pytest.log

      - name: Commit completed THOG enhancement
        if: steps.pytest.outcome == 'success'
        run: |
          if [[ -f .thog_apply.py ]]; then
            rm -f .thog_apply.py .thog_patch_part_* .thog_apply_trigger
            rm -f .github/workflows/apply_thog_patch_now.yml
            rm -f .github/workflows/apply_requested_optimisation_controls.yml
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add -A
            git commit -m 'Complete optimisation controls and LR/batch grids'
            git push origin HEAD:BLOCK_enhancements_group
          fi

      - name: Enforce pytest success
        if: steps.pytest.outcome != 'success'
        run: exit 1
