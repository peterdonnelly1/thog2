name: Apply THOG patch now

on:
  push:
    branches: [BLOCK_enhancements_group]
    paths: [.thog_apply_trigger]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: BLOCK_enhancements_group
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply prepared patch
        run: |
          cat .thog_patch_part_* > /tmp/thog_enhancement.patch
          git apply -p1 /tmp/thog_enhancement.patch
      - name: Install CPU dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch numpy pytest
      - name: Compile and test
        run: |
          python -m compileall -q sheet run_thog2_owt.py tests
          bash -n current_scruffy_train_OWT.sh
          bash -n current_dreedle_train_OWT.sh
          pytest -q
      - name: Commit completed implementation
        run: |
          rm -f .thog_patch_part_* .thog_apply_trigger
          rm -f .github/workflows/apply_thog_patch_now.yml
          rm -f .github/workflows/apply_requested_optimisation_controls.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Complete optimisation controls and LR/batch grids'
          git push origin HEAD:BLOCK_enhancements_group
