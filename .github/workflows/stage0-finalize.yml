name: Stage 0 finalize

on:
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'stage-0-baseline'
    runs-on: ubuntu-latest
    steps:
      - name: Check out Stage 0 branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install document and CPU test dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y pandoc
          python -m pip install --upgrade pip
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Reconstruct documents and run Stage 0 tests
        run: |
          set -euo pipefail
          mkdir -p docs evidence
          cat .stage0_build/stage0_docs_md.tar.gz.b64.part* | base64 --decode > /tmp/stage0_docs_md.tar.gz
          tar -xzf /tmp/stage0_docs_md.tar.gz -C docs
          for markdown_path in docs/THOG2_Chebyshev_Sheet_*_v0.1.md; do
            pandoc "$markdown_path" -o "${markdown_path%.md}.odt"
          done
          python .stage0_build/finalize_stage0.py

      - name: Remove temporary transport and enforce Stage 0 scope
        run: |
          set -euo pipefail
          rm -rf .stage0_build
          rm -f stage0_*probe*.txt
          rm -f .github/workflows/stage0-finalize.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git add -A
          python - <<'PY'
          import subprocess

          baseline = '3adf61e154c3fe3fca428ad6bc3818b27a3b8291'
          changed = subprocess.check_output(
              ['git', 'diff', '--cached', '--name-only', baseline], text=True
          ).splitlines()
          unexpected = [
              path for path in changed
              if not (
                  path == '.gitignore'
                  or path.startswith('docs/')
                  or path.startswith('evidence/')
              )
          ]
          if unexpected:
              raise SystemExit(f'unexpected final Stage 0 paths: {unexpected}')
          print('\n'.join(changed))
          PY

      - name: Commit finalized Stage 0 branch
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if git diff --cached --quiet; then
            echo 'No finalization changes to commit'
            exit 0
          fi
          git commit -m 'Stage 0: finalize documentation and checkout evidence'
          git push origin HEAD:stage-0-baseline
