name: Apply requested wrapper defaults

on:
  push:
    branches: [BLOCK_enhancements_group]
    paths: [.github/workflows/apply_requested_wrapper_defaults.yml]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: BLOCK_enhancements_group
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install CPU test dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet numpy pytest
          python -m pip install --quiet torch --index-url https://download.pytorch.org/whl/cpu

      - name: Apply requested wrapper and recovery defaults
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          wrappers = (
              Path('current_scruffy_train_OWT.sh'),
              Path('current_dreedle_train_OWT.sh'),
          )

          for path in wrappers:
              text = path.read_text(encoding='utf-8')
              text = text.replace('EVAL_INTERVAL=20\n', 'EVAL_INTERVAL=100\n', 1)
              text = text.replace('CHECKPOINT_INTERVAL=20\n', 'CHECKPOINT_INTERVAL=1000\n', 1)
              text = text.replace(
                  'FAST_DISCARD="${THOG2_FAST_DISCARD:-false}"',
                  'FAST_DISCARD="${THOG2_FAST_DISCARD:-true}"',
                  1,
              )
              text = '\n'.join(
                  line for line in text.splitlines()
                  if 'DIRECT_THOG_MLP_APPLICATION' not in line
              ) + '\n'

              if path.name.startswith('current_scruffy'):
                  old_lr = '''validate_lr_code() { [[ "$1" =~ ^[0-9]{1,2}$ ]] && (( 10#$1 > 0 )) || { echo "Invalid $2: $1; expected 01..99." >&2; exit 2; }; }
          parse_lr_code_values() {
            local normalized="${1//,/ }" value
            for value in $normalized; do validate_lr_code "$value" "LEARNING_RATE_CODES"; LEARNING_RATE_CODE_VALUES+=("$((10#$value))"); done
            (( ${#LEARNING_RATE_CODE_VALUES[@]} > 0 )) || { echo "Invalid learning-rate code list." >&2; exit 2; }
          }
          '''
              else:
                  old_lr = '''validate_lr_code() {
            [[ "$1" =~ ^[0-9]{1,2}$ ]] && (( 10#$1 > 0 )) || { echo "Invalid $2: $1; expected 01..99, where 70 means 7.0e-04." >&2; exit 2; }
          }
          parse_lr_code_values() {
            local normalized="${1//,/ }" value
            for value in $normalized; do
              validate_lr_code "$value" "LEARNING_RATE_CODES"
              LEARNING_RATE_CODE_VALUES+=("$((10#$value))")
            done
            (( ${#LEARNING_RATE_CODE_VALUES[@]} > 0 )) || { echo "Invalid LEARNING_RATE_CODES: empty value list." >&2; exit 2; }
          }
          '''

              new_lr = '''# vvv THOG allow high-LR experiments while retaining bounded validation for each LR control
          validate_lr_code() {
            local value="$1" label="$2" maximum="$3"
            [[ "$value" =~ ^[0-9]{1,4}$ ]] && (( 10#$value >= 1 && 10#$value <= maximum )) || {
              echo "Invalid $label: $value; expected 1..$maximum." >&2
              exit 2
            }
          }
          parse_lr_code_values() {
            local normalized="${1//,/ }" value
            for value in $normalized; do
              validate_lr_code "$value" "LEARNING_RATE_CODES" 1000
              LEARNING_RATE_CODE_VALUES+=("$((10#$value))")
            done
            (( ${#LEARNING_RATE_CODE_VALUES[@]} > 0 )) || { echo "Invalid learning-rate code list." >&2; exit 2; }
          }
          # ^^^ THOG
          '''
              if old_lr not in text:
                  raise SystemExit(f'LR validation anchor not found in {path}')
              text = text.replace(old_lr, new_lr, 1)
              text = text.replace(
                  'validate_lr_code "$MIN_LR_CODE" "MIN_LR_CODE"',
                  'validate_lr_code "$MIN_LR_CODE" "MIN_LR_CODE" 100',
                  1,
              )
              text = text.replace(
                  '70 means 7.0e-04; comma or quoted space list',
                  '1..1000; 70 means 7.0e-04 and 1000 means 1.0e-02; comma or quoted space list',
              )
              text = text.replace(
                  'learning-rate codes; 70 means 7.0e-04; list allowed',
                  'learning-rate codes 1..1000; 70 means 7.0e-04; list allowed',
              )
              text = text.replace(
                  '06 means 6.0e-05',
                  '1..100; 06 means 6.0e-05 and 100 means 1.0e-03',
              )

              text = text.replace(
                  'local residual_init_depth_source_value n_layer_value n_head_value n_embd_value shape_summary log_url viewer_url serve_url run_status',
                  'local residual_init_depth_source_value n_layer_value n_head_value n_embd_value shape_summary orders_summary start_time_friendly log_url viewer_url serve_url run_status',
                  1,
              )
              text = text.replace(
                  'shape_summary="L${n_layer_value} H${n_head_value} D${n_embd_value} C${BLOCK_SIZE}"\n',
                  'shape_summary="L${n_layer_value} H${n_head_value} D${n_embd_value} C${BLOCK_SIZE}"\n    orders_summary="n/a"\n',
                  1,
              )
              text = text.replace(
                  'shape_summary="L${n_layer_value} H${n_head_value} D${n_embd_value} C${BLOCK_SIZE} P${o_depth_value} Q${O_ATTN_D_MODEL} J${O_ATTN_QKV_PER_CHANNEL} O${O_ATTN_OUT_PER_CHANNEL} X${O_MLP_D_MODEL} Y${O_MLP_HIDDEN}"',
                  'shape_summary="L${n_layer_value} H${n_head_value} D${n_embd_value} C${BLOCK_SIZE}"\n    orders_summary="P${o_depth_value} Q${O_ATTN_D_MODEL} J${O_ATTN_QKV_PER_CHANNEL} O${O_ATTN_OUT_PER_CHANNEL} X${O_MLP_D_MODEL} Y${O_MLP_HIDDEN}"',
                  1,
              )
              text = text.replace(
                  'LOG_TIMESTAMP="$(date +%Y%m%d_%H%M%S)"\n',
                  'LOG_TIMESTAMP="$(date +%Y%m%d_%H%M%S)"\n  start_time_friendly="$(date \'+%H:%M  %d-%m-%y\')"\n',
                  1,
              )
              host = 'scruffy' if path.name.startswith('current_scruffy') else 'dreedle'
              text = text.replace(
                  f'{host} OWT train\n  artifact:           $artifact_name',
                  f'{host} OWT train\n  start time:         $start_time_friendly\n  artifact:           $artifact_name',
                  1,
              )
              text = text.replace(
                  '  shape:              $shape_summary\n',
                  '  shape:              $shape_summary\n  orders:             $orders_summary\n',
                  1,
              )
              path.write_text(text, encoding='utf-8')

          for path in (Path('sheet/training_config.py'), Path('sheet/run_config.py')):
              text = path.read_text(encoding='utf-8')
              old = 'nonfinite_update_policy: str = "raise"'
              if old not in text:
                  raise SystemExit(f'non-finite default anchor not found in {path}')
              path.write_text(text.replace(old, 'nonfinite_update_policy: str = "skip"', 1), encoding='utf-8')

          path = Path('run_thog2_owt.py')
          text = path.read_text(encoding='utf-8')
          old = 'parser.add_argument("--nonfinite-update-policy", choices=("raise", "skip"), default="raise")'
          if old not in text:
              raise SystemExit('run_thog2_owt non-finite parser anchor not found')
          path.write_text(text.replace(old, 'parser.add_argument("--nonfinite-update-policy", choices=("raise", "skip"), default="skip")', 1), encoding='utf-8')

          path = Path('tests/stage5_ddp_failure_worker.py')
          text = path.read_text(encoding='utf-8')
          old = '''    trainer = SharedTrainer(
              stage5_config(max_updates=1, decay_updates=1),
              train_tokens,
              validation_tokens,
          )
          '''
          new = '''    trainer = SharedTrainer(
              stage5_config(
                  max_updates=1,
                  decay_updates=1,
                  nonfinite_update_policy="raise",
              ),
              train_tokens,
              validation_tokens,
          )
          '''
          if old not in text:
              raise SystemExit('Stage 5 fail-fast worker anchor not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')

          path = Path('tests/test_stage8_wrapper_shell_syntax.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace('assert "EVAL_INTERVAL=20" in text', 'assert "EVAL_INTERVAL=100" in text', 1)
          text = text.replace('assert "LOG_INTERVAL=1" in text', 'assert "CHECKPOINT_INTERVAL=1000" in text\n        assert "LOG_INTERVAL=1" in text', 1)
          path.write_text(text, encoding='utf-8')

          path = Path('tests/test_wrapper_learning_rate_and_batch_grids.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace('assert f"lr_code={lr_code}" in completed.stdout', 'assert f"(LR_{lr_code})" in completed.stdout', 1)
          path.write_text(text, encoding='utf-8')
          PY

          cat > tests/test_picton_wrapper_defaults_and_nonfinite_policy.py <<'PY'
          # vvv THOG
          from __future__ import annotations

          import os
          import re
          import subprocess
          from pathlib import Path

          import pytest

          from run_thog2_owt import build_parser
          from sheet.run_config import OwtRunConfig
          from sheet.training_config import TrainingConfig


          REPOSITORY_ROOT = Path(__file__).resolve().parents[1]
          TRAINING_WRAPPERS = (
              REPOSITORY_ROOT / "current_scruffy_train_OWT.sh",
              REPOSITORY_ROOT / "current_dreedle_train_OWT.sh",
          )


          def _run_wrapper(
              wrapper: Path,
              python_bin: Path,
              *extra_arguments: str,
          ) -> subprocess.CompletedProcess[str]:
              command = [
                  "bash", str(wrapper), "-g", "PICTON_TEST", "-p", "full_block",
                  "-n", "2", "-b", "1", "-A", "1", "-u", "1", "-l", "1",
                  "-w", "1", "-L", "2", "-H", "1", "-D", "4", "-C", "2",
                  "-P", "1", "-Q", "2", "-J", "1", "-O", "1", "-X", "2",
                  "-Y", "4", "-S", "1", "-T", "float32", "-K", "math",
                  "-I", "none", "-F", "none", "-x", "true", *extra_arguments,
              ]
              return subprocess.run(
                  command,
                  cwd=REPOSITORY_ROOT,
                  env={**os.environ, "THOG2_PYTHON": str(python_bin)},
                  text=True,
                  capture_output=True,
                  timeout=90,
                  check=False,
              )


          @pytest.fixture(scope="module")
          def fake_python(tmp_path_factory: pytest.TempPathFactory) -> Path:
              executable = tmp_path_factory.mktemp("wrapper_python") / "fake_python"
              executable.write_text(
                  """#!/usr/bin/env python3
          import json
          import sys

          if len(sys.argv) >= 2 and sys.argv[1] == '-c':
              payload = json.load(sys.stdin)
              code = sys.argv[2]
              if '[\"artifact_name\"]' in code:
                  print(payload['artifact_name'])
              elif '[\"paths\"][\"log_path\"]' in code:
                  print(payload['paths']['log_path'])
              raise SystemExit(0)
          args = sys.argv[1:]
          def value(name):
              return args[args.index(name) + 1]
          artifact = 'FAKE_' + value('--host-label')
          if '--print-resolved-json' in args or '--dry-run' in args:
              print(json.dumps({'artifact_name': artifact, 'paths': {'log_path': f'logs/{artifact}/train.log'}}))
          """,
                  encoding="utf-8",
              )
              executable.chmod(0o755)
              return executable


          @pytest.fixture(scope="module")
          def wrapper_outputs(fake_python: Path) -> dict[Path, str]:
              outputs: dict[Path, str] = {}
              for wrapper in TRAINING_WRAPPERS:
                  completed = _run_wrapper(wrapper, fake_python, "-c", "1000", "-f", "100")
                  assert completed.returncode == 0, completed.stdout + completed.stderr
                  outputs[wrapper] = completed.stdout
              return outputs


          def test_current_training_wrappers_default_to_fast_discard_eval_100_and_checkpoint_1000(
              wrapper_outputs: dict[Path, str],
          ) -> None:
              for output in wrapper_outputs.values():
                  assert "fast discard:       true" in output
                  assert "eval_every=100" in output
                  assert "ckpt_every=1000" in output


          def test_current_training_wrappers_print_start_time_before_artifact_and_split_shape_from_orders(
              wrapper_outputs: dict[Path, str],
          ) -> None:
              for output in wrapper_outputs.values():
                  start_match = re.search(
                      r"^  start time:\s+(\d{2}:\d{2}  \d{2}-\d{2}-\d{2})$",
                      output,
                      re.MULTILINE,
                  )
                  assert start_match is not None, output
                  start_index = output.index("  start time:")
                  artifact_index = output.index("  artifact:")
                  shape_line = next(line for line in output.splitlines() if line.startswith("  shape:"))
                  orders_line = next(line for line in output.splitlines() if line.startswith("  orders:"))
                  assert start_index < artifact_index
                  assert shape_line.rstrip().endswith("L2 H1 D4 C2")
                  assert orders_line.rstrip().endswith("P1 Q2 J1 O1 X2 Y4")
                  assert " P1" not in shape_line


          def test_current_training_wrappers_remove_retired_direct_thog_mlp_application_name() -> None:
              for wrapper in TRAINING_WRAPPERS:
                  source = wrapper.read_text(encoding="utf-8")
                  assert "DIRECT_THOG_MLP_APPLICATION" not in source


          def test_current_training_wrappers_accept_lr_code_1000_and_min_lr_code_100(
              wrapper_outputs: dict[Path, str],
          ) -> None:
              for output in wrapper_outputs.values():
                  assert "1000e-5" in output
                  assert "100e-5" in output


          def test_current_training_wrappers_reject_lr_codes_above_the_new_limits(
              fake_python: Path,
          ) -> None:
              for wrapper in TRAINING_WRAPPERS:
                  bad_learning_rate = _run_wrapper(wrapper, fake_python, "-c", "1001")
                  bad_minimum = _run_wrapper(wrapper, fake_python, "-f", "101")
                  assert bad_learning_rate.returncode == 2
                  assert "expected 1..1000" in bad_learning_rate.stderr
                  assert bad_minimum.returncode == 2
                  assert "expected 1..100" in bad_minimum.stderr


          def test_core_nonfinite_recovery_defaults_to_bounded_skip_across_public_config_layers() -> None:
              parser_arguments = build_parser().parse_args(["--model-type", "dense"])
              run_config = OwtRunConfig(model_type="dense")
              training_config = TrainingConfig()
              assert parser_arguments.nonfinite_update_policy == "skip"
              assert parser_arguments.max_nonfinite_update_skips == 10
              assert run_config.nonfinite_update_policy == "skip"
              assert run_config.max_nonfinite_update_skips == 10
              assert training_config.nonfinite_update_policy == "skip"
              assert training_config.max_nonfinite_update_skips == 10


          def test_explicit_fail_fast_nonfinite_policy_remains_available() -> None:
              parser_arguments = build_parser().parse_args(
                  ["--model-type", "dense", "--nonfinite-update-policy", "raise"]
              )
              assert parser_arguments.nonfinite_update_policy == "raise"
              assert OwtRunConfig(
                  model_type="dense",
                  nonfinite_update_policy="raise",
              ).nonfinite_update_policy == "raise"
              assert TrainingConfig(
                  nonfinite_update_policy="raise"
              ).nonfinite_update_policy == "raise"
          # ^^^ THOG
          PY

      - name: Validate requested changes
        run: |
          bash -n current_scruffy_train_OWT.sh
          bash -n current_dreedle_train_OWT.sh
          python -m compileall -q run_thog2_owt.py sheet tests
          pytest -q tests/test_picton_wrapper_defaults_and_nonfinite_policy.py
          pytest -q tests/test_picton_nonfinite_update_recovery.py
          pytest -q tests/test_sheet_stage5_failures.py
          pytest -q tests/test_stage8_wrapper_shell_syntax.py
          pytest -q tests/test_wrapper_learning_rate_and_batch_grids.py
          pytest -q

      - name: Commit tested changes and remove temporary workflow
        shell: bash
        run: |
          rm .github/workflows/apply_requested_wrapper_defaults.yml
          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Apply requested training wrapper defaults"
          git push origin HEAD:BLOCK_enhancements_group
