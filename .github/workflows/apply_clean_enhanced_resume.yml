# vvv THOG
name: Apply clean enhanced resume implementation

on:
  push:
    branches:
      - enhanced_resume_and_fork
  pull_request:
    branches:
      - BLOCK_enhancements_group

permissions:
  contents: write

jobs:
  apply_and_verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check out target branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: enhanced_resume_and_fork

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Reconstruct and extract verified implementation bundle
        shell: bash
        run: |
          set -euo pipefail
          cat \
            .resume_bundle_part_00 \
            .resume_bundle_part_01 \
            .resume_bundle_part_02a \
            .resume_bundle_part_02b \
            .resume_bundle_part_03 \
            .resume_bundle_part_03b \
            .resume_bundle_part_04a \
            .resume_bundle_part_04b \
            .resume_bundle_part_05 \
            .resume_bundle_part_06 \
            .resume_bundle_part_07 \
            .resume_bundle_part_08 \
            .resume_bundle_part_09 \
            .resume_bundle_part_10 \
            .resume_bundle_part_11 \
            | tr -d '\r\n' \
            | base64 --decode > /tmp/enhanced_resume_and_fork.tar.gz
          echo '73ccdf2978e8372be5de133db3e0e93d8cc70e6da4801c36868495731243a5e3  /tmp/enhanced_resume_and_fork.tar.gz' | sha256sum -c -
          tar -tzf /tmp/enhanced_resume_and_fork.tar.gz
          tar -xzf /tmp/enhanced_resume_and_fork.tar.gz -C .
          git diff --check

      - name: Install CPU test dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet numpy pytest tiktoken tensorboard wandb matplotlib plotly
          python -m pip install --quiet torch --index-url https://download.pytorch.org/whl/cpu

      - name: Compile sources and check wrappers
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall -q sheet run_thog2_owt.py tests
          bash -n current_dreedle_train_OWT.sh current_scruffy_train_OWT.sh

      - name: Run focused lifecycle tests
        env:
          PYTHONPATH: .
        shell: bash
        run: |
          set -euo pipefail
          pytest -q \
            tests/test_checkpoint_resolver.py \
            tests/test_enhanced_resume_cli.py \
            tests/test_resume_schedule_calculation.py \
            tests/test_resume_identity_and_throughput.py \
            tests/test_fork_lineage.py \
            tests/test_fork_lr_schedule.py \
            tests/test_sheet_stage6_canonical_naming.py

      - name: Run wrapper regressions in isolated processes
        env:
          PYTHONPATH: .
        shell: bash
        run: |
          set -euo pipefail
          pytest -q tests/test_wrapper_learning_rate_and_batch_grids.py::test_scruffy_dry_run_expands_cartesian_product_of_batch_and_learning_rate_values
          pytest -q tests/test_wrapper_learning_rate_and_batch_grids.py::test_resume_wrapper_forwards_explicit_material_values_as_assertions
          pytest -q tests/test_wrapper_learning_rate_and_batch_grids.py::test_resume_wrapper_rejects_grid_valued_material_assertions

      - name: Run real CPU fresh resume fork integration
        env:
          PYTHONPATH: .
        run: pytest -q tests/test_enhanced_resume_integration.py

      - name: Commit clean verified implementation
        shell: bash
        run: |
          set -euo pipefail
          rm -f \
            .resume_bundle_part_00 .resume_bundle_part_01 .resume_bundle_part_02 \
            .resume_bundle_part_02a .resume_bundle_part_02b \
            .resume_bundle_part_03 .resume_bundle_part_03b .resume_bundle_part_04 \
            .resume_bundle_part_04a .resume_bundle_part_04b \
            .resume_bundle_part_05 .resume_bundle_part_06 .resume_bundle_part_07 \
            .resume_bundle_part_08 .resume_bundle_part_09 .resume_bundle_part_10 \
            .resume_bundle_part_11 .resume_bundle_audit.log \
            .github/workflows/apply_clean_enhanced_resume.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m 'Implement enhanced resume and fork lifecycle'
          git push origin HEAD:enhanced_resume_and_fork
# ^^^ THOG
