name: Stage 3 training lifecycle

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stage3-cpu:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install CPU dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install numpy
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Enforce Stage 3 source scope
        if: github.head_ref == 'stage3-training-lifecycle'
        run: |
          set -euo pipefail
          git fetch origin master
          python - <<'PY'
          import subprocess
          changed = subprocess.check_output(
              ['git', 'diff', '--name-only', 'origin/master...HEAD'], text=True
          ).splitlines()
          allowed = (
              'sheet/', 'tests/', 'evidence/stage3_', 'docs/THOG2_Stage_3_',
              'train_thog2.py', 'run_thog2_stage3_cuda_check.py',
              '.github/workflows/stage2-reference.yml',
              '.github/workflows/stage3-lifecycle.yml',
          )
          unexpected = [path for path in changed if not any(
              path == prefix or path.startswith(prefix) for prefix in allowed
          )]
          if unexpected:
              raise SystemExit(f'unexpected Stage 3 paths: {unexpected}')
          protected = {'model.py', 'train.py', 'sample.py', 'configurator.py'}
          touched = sorted(protected.intersection(changed))
          if touched:
              raise SystemExit(f'Stage 3 touched protected runtime files: {touched}')
          print('\n'.join(changed))
          PY
      - name: Compile all Python sources
        run: |
          python -m compileall -q \
            sheet \
            tests \
            train_thog2.py \
            run_thog2_stage3_cuda_check.py
      - name: Run Stage 1 regression
        run: python tests/run_sheet_stage1_tests.py --evidence /tmp/stage1.json
      - name: Run Stage 2 regression
        run: python tests/run_sheet_stage2_tests.py --evidence /tmp/stage2.json
      - name: Run Stage 3 CPU lifecycle tests
        run: |
          mkdir -p evidence
          python tests/run_sheet_stage3_tests.py --evidence evidence/stage3_cpu_lifecycle.json
      - name: Record CUDA availability
        run: python run_thog2_stage3_cuda_check.py --evidence evidence/stage3_gpu_smoke.json
      - name: Upload Stage 3 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage3-lifecycle-evidence
          path: |
            evidence/stage3_cpu_lifecycle.json
            evidence/stage3_gpu_smoke.json
          if-no-files-found: error
