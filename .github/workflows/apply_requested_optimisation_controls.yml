    def parameter_artifact_fragment(self) -> str:
        fields = [
            f"LR_{self.learning_rate_artifact_code()}",
'''
          if anchor not in text:
              raise SystemExit('parameter_artifact_fragment anchor not found')
          text = text.replace(anchor, replacement)
          path.write_text(text, encoding='utf-8')
          # ^^^ THOG

          for wrapper_name in ('current_scruffy_train_OWT.sh', 'current_dreedle_train_OWT.sh'):
              path = root / wrapper_name
              text = path.read_text(encoding='utf-8')
              text = text.replace('DIRECT_THOG_MLP_APPLICATION="${THOG2_DIRECT_THOG_MLP_APPLICATION:-false}"', 'DIRECT_FACTORISED_MLP="${THOG2_DIRECT_FACTORISED_MLP:-true}"                                                                                          # <<< THOG renamed default-on exact factorised MLP application\nVECTORISE_PER_HEAD_MATERIALISATION="${THOG2_VECTORISE_PER_HEAD_MATERIALISATION:-true}"                                                                    # <<< THOG default-on selectable per-head vectorisation')
              text = text.replace('validate_true_false "$DIRECT_THOG_MLP_APPLICATION" "DIRECT_THOG_MLP_APPLICATION"', 'validate_true_false "$DIRECT_FACTORISED_MLP" "DIRECT_FACTORISED_MLP"\nvalidate_true_false "$VECTORISE_PER_HEAD_MATERIALISATION" "VECTORISE_PER_HEAD_MATERIALISATION"')
              text = text.replace('export THOG2_DIRECT_THOG_MLP_APPLICATION="$DIRECT_THOG_MLP_APPLICATION"', 'export THOG2_DIRECT_THOG_MLP_APPLICATION="$DIRECT_FACTORISED_MLP"                                                                                  # <<< THOG internal compatibility mapping for renamed public option\nexport THOG2_VECTORISE_PER_HEAD_MATERIALISATION="$VECTORISE_PER_HEAD_MATERIALISATION"')
              text = text.replace('  direct THOG MLP apply:    $DIRECT_THOG_MLP_APPLICATION', '  direct factorised MLP:    $DIRECT_FACTORISED_MLP\n  vectorise per-head materialisation: $VECTORISE_PER_HEAD_MATERIALISATION')
              text = text.replace('WARMUP_ITERS=10\n', 'WARMUP_ITERS=10\nLEARNING_RATE_CODES="${THOG2_LEARNING_RATE_CODES:-60}"                                                                                                     # <<< THOG two-digit codes in units of 1e-5; 70 means 7e-4\nMIN_LR="${THOG2_MIN_LR:-6e-5}"                                                                                                                             # <<< THOG wrapper min learning-rate control\n')
              text = text.replace('  -w WARMUP_ITERS=${WARMUP_ITERS}\n', '  -w WARMUP_ITERS=${WARMUP_ITERS}\n  --lr CODES=${LEARNING_RATE_CODES}                    two-digit code/list; 70 means 7e-4\n  --min-lr VALUE=${MIN_LR}\n')
              getopts_index = text.index('while getopts ')
              preparse = '''# vvv THOG parse wrapper long options before getopts while preserving arguments after --
WRAPPER_ARGS=()
while (( $# > 0 )); do
  case "$1" in
    --lr) [[ $# -ge 2 ]] || { echo "--lr requires a value." >&2; exit 2; }; LEARNING_RATE_CODES="$2"; shift 2 ;;
    --min-lr) [[ $# -ge 2 ]] || { echo "--min-lr requires a value." >&2; exit 2; }; MIN_LR="$2"; shift 2 ;;
    --) WRAPPER_ARGS+=("$@"); break ;;
    *) WRAPPER_ARGS+=("$1"); shift ;;
  esac
done
set -- "${WRAPPER_ARGS[@]}"
# ^^^ THOG

'''
              text = text[:getopts_index] + preparse + text[getopts_index:]
              text = text.replace('O_DEPTH_VALUES=()\nPRESET_VALUES=()\n', 'O_DEPTH_VALUES=()\nPRESET_VALUES=()\nBATCH_SIZE_VALUES=()\nLEARNING_RATE_CODE_VALUES=()\n')
              insert = '''parse_batch_size_values() {
  local normalized="${1//,/ }" value
  for value in $normalized; do validate_positive_uint "$value" "BATCH_SIZE"; BATCH_SIZE_VALUES+=("$value"); done
  (( ${#BATCH_SIZE_VALUES[@]} > 0 )) || { echo "Invalid BATCH_SIZE: empty value list." >&2; exit 2; }
}
parse_learning_rate_codes() {
  local normalized="${1//,/ }" value
  for value in $normalized; do
    [[ "$value" =~ ^[0-9]{2}$ ]] || { echo "Invalid LR code: $value; expected exactly two digits such as 70." >&2; exit 2; }
    (( 10#$value > 0 )) || { echo "Invalid LR code: $value; expected a positive code." >&2; exit 2; }
    LEARNING_RATE_CODE_VALUES+=("$value")
  done
  (( ${#LEARNING_RATE_CODE_VALUES[@]} > 0 )) || { echo "Invalid LR code list: empty value list." >&2; exit 2; }
}
learning_rate_from_code() { awk -v code="$1" 'BEGIN { printf "%.10g", code * 1e-5 }'; }
'''
              text = text.replace('parse_o_depth_values() {', insert + 'parse_o_depth_values() {')
              text = text.replace('parse_o_depth_values "$O_DEPTH"\nparse_geometry_preset_values "$GEOMETRY_PRESET"\n', 'parse_o_depth_values "$O_DEPTH"\nparse_geometry_preset_values "$GEOMETRY_PRESET"\nparse_batch_size_values "$BATCH_SIZE"\nparse_learning_rate_codes "$LEARNING_RATE_CODES"\n')
              text = text.replace('for setting in "$STEPS" "$BATCH_SIZE" "$GRADIENT_ACCUMULATION_STEPS"', 'for setting in "$STEPS" "$GRADIENT_ACCUMULATION_STEPS"')
              text = text.replace('  local o_depth_value="$2"\n', '  local o_depth_value="$2"\n  local batch_size_value="$3"\n  local learning_rate_code="$4"\n  local learning_rate_value\n  learning_rate_value="$(learning_rate_from_code "$learning_rate_code")"\n')
              text = text.replace('--max-iters "$STEPS" --batch-size "$BATCH_SIZE" --gradient-accumulation-steps', '--max-iters "$STEPS" --batch-size "$batch_size_value" --gradient-accumulation-steps')
              text = text.replace('--eval-iters "$EVAL_ITERS" --eval-interval "$EVAL_INTERVAL" --log-interval "$LOG_INTERVAL" --checkpoint-interval "$CHECKPOINT_INTERVAL" --warmup-iters "$WARMUP_ITERS"', '--eval-iters "$EVAL_ITERS" --eval-interval "$EVAL_INTERVAL" --log-interval "$LOG_INTERVAL" --checkpoint-interval "$CHECKPOINT_INTERVAL" --warmup-iters "$WARMUP_ITERS" --learning-rate "$learning_rate_value" --min-lr "$MIN_LR"')
              text = text.replace('  schedule:           steps=$STEPS', '  optimizer:          lr=$learning_rate_value (LR_$learning_rate_code) min_lr=$MIN_LR\n  schedule:           steps=$STEPS')
              text = text.replace('  batch/accum/gpus:   $BATCH_SIZE / $GRADIENT_ACCUMULATION_STEPS / $NUM_GPUS', '  batch/accum/gpus:   $batch_size_value / $GRADIENT_ACCUMULATION_STEPS / $NUM_GPUS')
              tail_start = text.index('if (( ${#PRESET_VALUES[@]} > 1 || ${#O_DEPTH_VALUES[@]} > 1 )); then')
              tail_end = text.index('# ^^^ THOG', tail_start)
              host = 'scruffy' if 'scruffy' in wrapper_name else 'dreedle'
              new_tail = f'''if (( ${{#PRESET_VALUES[@]}} > 1 || ${{#O_DEPTH_VALUES[@]}} > 1 || ${{#BATCH_SIZE_VALUES[@]}} > 1 || ${{#LEARNING_RATE_CODE_VALUES[@]}} > 1 )); then
  echo "{host} OWT grid: p=${{PRESET_VALUES[*]}} P=${{O_DEPTH_VALUES[*]}} b=${{BATCH_SIZE_VALUES[*]}} LR=${{LEARNING_RATE_CODE_VALUES[*]}}"
fi
for geometry_preset_value in "${{PRESET_VALUES[@]}}"; do
  for batch_size_value in "${{BATCH_SIZE_VALUES[@]}}"; do
    for learning_rate_code in "${{LEARNING_RATE_CODE_VALUES[@]}}"; do
      if [[ "$geometry_preset_value" == dense ]]; then
        run_preset_o_depth "$geometry_preset_value" "${{O_DEPTH_VALUES[0]}}" "$batch_size_value" "$learning_rate_code"
      else
        for o_depth_value in "${{O_DEPTH_VALUES[@]}}"; do
          run_preset_o_depth "$geometry_preset_value" "$o_depth_value" "$batch_size_value" "$learning_rate_code"
        done
      fi
    done
  done
done
'''
              text = text[:tail_start] + new_tail + text[tail_end:]
              path.write_text(text, encoding='utf-8')

          # Update the existing direct-MLP wrapper regression for the renamed public option.
          path = root / 'tests/test_direct_thog_mlp_application.py'
          text = path.read_text(encoding='utf-8')
          text = text.replace('test_training_wrappers_expose_default_off_direct_thog_mlp_application_without_getopts_letter', 'test_training_wrappers_expose_default_on_direct_factorised_mlp_without_getopts_letter')
          text = text.replace('assert \'DIRECT_THOG_MLP_APPLICATION="${THOG2_DIRECT_THOG_MLP_APPLICATION:-false}"\' in source', 'assert \'DIRECT_FACTORISED_MLP="${THOG2_DIRECT_FACTORISED_MLP:-true}"\' in source')
          text = text.replace('assert \'export THOG2_DIRECT_THOG_MLP_APPLICATION="$DIRECT_THOG_MLP_APPLICATION"\' in source', 'assert \'export THOG2_DIRECT_THOG_MLP_APPLICATION="$DIRECT_FACTORISED_MLP"\' in source')
          text = text.replace('assert "direct THOG MLP apply:" in source', 'assert "direct factorised MLP:" in source')
          text = text.replace('assert "DIRECT_THOG_MLP_APPLICATION" not in source[source.index("while getopts"):source.index("done", source.index("while getopts"))]', 'assert "DIRECT_FACTORISED_MLP" not in source[source.index("while getopts"):source.index("done", source.index("while getopts"))]')
          path.write_text(text, encoding='utf-8')

          (root / 'tests/test_optimisation_controls_and_grid_axes.py').write_text('''# vvv THOG
from __future__ import annotations

import copy
import os
from pathlib import Path
from unittest import mock

import pytest
import torch

from sheet.block_trajectory import BlockTrajectory
from sheet.geometry import SheetGeometryConfig
from sheet.run_config import OwtRunConfig
from sheet.semantic_materializer import ATTENTION_OUTPUT_WEIGHT, ATTENTION_QUERY_WEIGHT

REPOSITORY_ROOT = Path(__file__).resolve().parents[1]


def _trajectory(vectorised: bool) -> BlockTrajectory:
    with mock.patch.dict(os.environ, {"THOG2_VECTORISE_PER_HEAD_MATERIALISATION": "true" if vectorised else "false"}):
        return BlockTrajectory(SheetGeometryConfig(n_layer=4, n_embd=16, n_head=2, depth_order=3, base_row_order=8,
                                                   o_attn_d_model=8, o_attn_qkv_per_channel=4,
                                                   o_attn_out_per_channel=4, o_mlp_d_model=8, o_mlp_hidden=20, bias=True))


@pytest.mark.parametrize("name", [ATTENTION_QUERY_WEIGHT, ATTENTION_OUTPUT_WEIGHT])
def test_vectorised_and_legacy_per_head_materialisation_match_forward_and_gradients(name: str) -> None:
    torch.manual_seed(8811)
    vectorised = _trajectory(True).double()
    legacy = copy.deepcopy(vectorised)
    legacy.vectorise_per_head_materialisation = False
    y0 = vectorised.materialize(name, 2)
    y1 = legacy.materialize(name, 2)
    torch.testing.assert_close(y0, y1, rtol=1e-12, atol=1e-12)
    y0.square().sum().backward(); y1.square().sum().backward()
    torch.testing.assert_close(vectorised.coefficients[name].grad, legacy.coefficients[name].grad, rtol=1e-11, atol=1e-11)


def test_learning_rate_artifact_code_and_fragment() -> None:
    config = OwtRunConfig(model_type="dense", learning_rate=7e-4, min_lr=7e-5, warmup_iters=10, max_iters=100)
    assert config.learning_rate_artifact_code() == "70"
    assert "_LR_70_" in f"_{config.parameter_artifact_fragment()}_"


def test_wrappers_expose_default_on_controls_and_grid_axes() -> None:
    for name in ("current_scruffy_train_OWT.sh", "current_dreedle_train_OWT.sh"):
        source = (REPOSITORY_ROOT / name).read_text(encoding="utf-8")
        assert 'DIRECT_FACTORISED_MLP="${THOG2_DIRECT_FACTORISED_MLP:-true}"' in source
        assert 'VECTORISE_PER_HEAD_MATERIALISATION="${THOG2_VECTORISE_PER_HEAD_MATERIALISATION:-true}"' in source
        assert "--lr" in source and "--min-lr" in source
        assert "BATCH_SIZE_VALUES" in source and "LEARNING_RATE_CODE_VALUES" in source
# ^^^ THOG
''', encoding='utf-8')
          PY
      - name: Compile and test
        run: |
          python -m compileall -q sheet run_thog2_owt.py tests
          bash -n current_scruffy_train_OWT.sh
          bash -n current_dreedle_train_OWT.sh
          pytest -q
      - name: Commit changes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add sheet/block_trajectory.py sheet/run_config.py current_scruffy_train_OWT.sh current_dreedle_train_OWT.sh tests/test_direct_thog_mlp_application.py tests/test_optimisation_controls_and_grid_axes.py
          git commit -m "Add optimisation controls and LR/batch grids"
          git push origin HEAD:BLOCK_enhancements_group
