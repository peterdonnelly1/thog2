          # vvv THOG LR artifact code
          path = root / 'sheet/run_config.py'
          text = path.read_text(encoding='utf-8')
          anchor = '''    def parameter_artifact_fragment(self) -> str:
        fields = [
'''
          replacement = '''    def learning_rate_artifact_code(self) -> str:
        scaled = self.learning_rate * 1.0e5
        rounded = round(scaled)
        if abs(scaled - rounded) > 1.0e-9 or rounded < 0 or rounded > 99:
