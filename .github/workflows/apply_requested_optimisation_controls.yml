name: Apply requested optimisation controls

on:
  push:
    branches: [BLOCK_enhancements_group]
    paths: [.github/workflows/apply_requested_optimisation_controls.yml]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: BLOCK_enhancements_group
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install CPU test dependencies
        run: pip install torch numpy pytest
      - name: Apply source changes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path('.')

          # vvv THOG selectable per-head vectorisation, default on
          path = root / 'sheet/block_trajectory.py'
          text = path.read_text(encoding='utf-8')
          if 'import os\n' not in text:
              text = text.replace('import math\n', 'import math\nimport os\n')
          marker = '        self.compact_mlp = compact_mlp\n'
          if 'vectorise_per_head_materialisation' not in text:
              text = text.replace(marker, marker + '        self.vectorise_per_head_materialisation = os.environ.get("THOG2_VECTORISE_PER_HEAD_MATERIALISATION", "true").strip().lower() in {"1", "true", "yes", "on"}  # <<< THOG selectable per-head vectorisation, default on\n')
          old = '''    # vvv THOG vectorize all head-aware block contractions to eliminate per-head Python loops and small-kernel launch storms
    def _materialize_head_output_block(self, name: str, layer_index: int) -> Tensor:
        item = self._block_metadata_by_name[name]
        coefficient = self.coefficients[name]
        depth_row = self.depth_basis[layer_index].to(coefficient)
        output_basis = self.output_basis(name).to(coefficient)
        input_basis_transposed = self.input_basis(name).to(coefficient).transpose(0, 1)
        mixed = torch.einsum("p,hpab->hab", depth_row, coefficient)
        generated_by_head = torch.matmul(output_basis.unsqueeze(0), mixed)
        generated_by_head = torch.matmul(generated_by_head, input_basis_transposed.unsqueeze(0))
        return generated_by_head.reshape(item.output_rows, item.row_width)

    def _materialize_head_input_block(self, name: str, layer_index: int) -> Tensor:
        item = self._block_metadata_by_name[name]
        coefficient = self.coefficients[name]
        depth_row = self.depth_basis[layer_index].to(coefficient)
        output_basis = self.output_basis(name).to(coefficient)
        input_basis_transposed = self.input_basis(name).to(coefficient).transpose(0, 1)
        mixed = torch.einsum("p,hpab->hab", depth_row, coefficient)
        generated_by_head = torch.matmul(output_basis.unsqueeze(0), mixed)
        generated_by_head = torch.matmul(generated_by_head, input_basis_transposed.unsqueeze(0))
        return generated_by_head.permute(1, 0, 2).reshape(item.output_rows, item.row_width)
    # ^^^ THOG
'''
          new = '''    # vvv THOG selectable vectorised and legacy per-head materialisation paths for exact A/B comparisons
    def _materialize_head_blocks(self, name: str, layer_index: int) -> Tensor:
        coefficient = self.coefficients[name]
        depth_row = self.depth_basis[layer_index].to(coefficient)
        output_basis = self.output_basis(name).to(coefficient)
        input_basis_transposed = self.input_basis(name).to(coefficient).transpose(0, 1)
        if self.vectorise_per_head_materialisation:
            mixed = torch.einsum("p,hpab->hab", depth_row, coefficient)
            generated_by_head = torch.matmul(output_basis.unsqueeze(0), mixed)
            return torch.matmul(generated_by_head, input_basis_transposed.unsqueeze(0))
        pieces = []
        for head_index in range(coefficient.shape[0]):
            mixed = torch.einsum("p,pab->ab", depth_row, coefficient[head_index])
            pieces.append(output_basis @ mixed @ input_basis_transposed)
        return torch.stack(pieces, dim=0)

    def _materialize_head_output_block(self, name: str, layer_index: int) -> Tensor:
        item = self._block_metadata_by_name[name]
        generated_by_head = self._materialize_head_blocks(name, layer_index)
        return generated_by_head.reshape(item.output_rows, item.row_width)

    def _materialize_head_input_block(self, name: str, layer_index: int) -> Tensor:
        item = self._block_metadata_by_name[name]
        generated_by_head = self._materialize_head_blocks(name, layer_index)
        return generated_by_head.permute(1, 0, 2).reshape(item.output_rows, item.row_width)
    # ^^^ THOG
'''
          if old not in text:
              raise SystemExit('expected vectorised materialisation block not found')
          text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
