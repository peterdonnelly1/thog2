import tempfile
import unittest
from pathlib import Path

import torch

from sheet.trainer_state import TrainerState
from sheet.trainer_step import TrainerStepMixin
from sheet.training_config import TrainingConfig


class _Distributed:
    rank = 0
    def all_true(self, value): return bool(value)
    def all_gather_object(self, value): return [value]


class _Optimizer:
    def __init__(self, model):
        self.model = model
        self.zero_grad_calls = 0
    def zero_grad(self, *, set_to_none):
        self.zero_grad_calls += 1
        for parameter in self.model.parameters():
            parameter.grad = None


class _Scaler:
    def __init__(self): self.update_calls = 0
    def update(self): self.update_calls += 1


class _Model(torch.nn.Module):
    def __init__(self):
        super().__init__()
        self.weight = torch.nn.Parameter(torch.ones(2))


class _Harness(TrainerStepMixin):
    def __init__(self, policy='skip', max_skips=2):
        self.config = TrainingConfig(nonfinite_update_policy=policy, max_nonfinite_update_skips=max_skips)
        self.state = TrainerState()
        self.distributed = _Distributed()
        self.raw_model = _Model()
        self.optimizer = _Optimizer(self.raw_model)
        self.scaler = _Scaler()
        self.events = []
    def _record(self, name, **payload): self.events.append((name, payload))


class PictonNonfiniteUpdateRecoveryTests(unittest.TestCase):
    def test_skip_discards_attempt_without_completing_update_and_records_named_bad_gradient(self):
        harness = _Harness()
        harness.raw_model.weight.grad = torch.tensor([float('nan'), 2.0])
        metrics = harness._handle_nonfinite_update(reason='gradient', learning_rate=1e-4, training_loss=4.5, gradient_norm=None, micro_step=None, microbatch_starts=[(11, 22)], scaler_unscaled=True)
        self.assertEqual(harness.state.completed_updates, 0)
        self.assertEqual(harness.state.skipped_nonfinite_updates, 1)
        self.assertEqual(harness.state.failed_update_attempts, 1)
        self.assertEqual(metrics['skipped_update'], 1.0)
        self.assertIsNone(harness.raw_model.weight.grad)
        self.assertEqual(harness.scaler.update_calls, 1)
        self.assertEqual(metrics['nonfinite_diagnostics']['rank_reports'][0]['gradient_reports'][0]['parameter_name'], 'weight')

    def test_raise_policy_cleans_post_unscale_state_before_raising(self):
        harness = _Harness(policy='raise')
        harness.raw_model.weight.grad = torch.tensor([float('inf'), 1.0])
        with self.assertRaises(FloatingPointError):
            harness._handle_nonfinite_update(reason='gradient', learning_rate=1e-4, training_loss=4.5, gradient_norm=None, micro_step=None, microbatch_starts=[], scaler_unscaled=True)
        self.assertEqual(harness.scaler.update_calls, 1)
        self.assertIsNone(harness.raw_model.weight.grad)
        self.assertEqual(harness.state.failed_update_attempts, 1)

    def test_skip_limit_exhaustion_does_not_increment_completed_or_skipped_counter(self):
        harness = _Harness(max_skips=0)
        harness.raw_model.weight.grad = torch.tensor([float('nan'), 1.0])
        with self.assertRaises(FloatingPointError):
            harness._handle_nonfinite_update(reason='gradient', learning_rate=1e-4, training_loss=4.5, gradient_norm=None, micro_step=None, microbatch_starts=[], scaler_unscaled=True)
        self.assertEqual(harness.state.completed_updates, 0)
        self.assertEqual(harness.state.skipped_nonfinite_updates, 0)
        self.assertEqual(harness.state.failed_update_attempts, 1)

    def test_trainer_state_round_trips_recovery_counters(self):
        original = TrainerState(completed_updates=7, skipped_nonfinite_updates=2, failed_update_attempts=3)
        restored = TrainerState(**original.__dict__)
        self.assertEqual(restored, original)


if __name__ == '__main__':
    unittest.main()
