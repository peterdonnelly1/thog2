# vvv THOG
name: Stage 1 mathematical core

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stage1-core:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install CPU PyTorch
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Enforce Stage 1 source scope
        run: |
          set -euo pipefail
          git fetch origin master
          python - <<'PY'
          import subprocess

          changed = subprocess.check_output(
              ['git', 'diff', '--name-only', 'origin/master...HEAD'], text=True
          ).splitlines()
          allowed = (
              'sheet/',
              'tests/',
              'evidence/',
              'docs/THOG2_Stage_1_',
              '.github/workflows/stage1-core.yml',
          )
          unexpected = [
              path for path in changed
              if not any(path == prefix or path.startswith(prefix) for prefix in allowed)
          ]
          if unexpected:
              raise SystemExit(f'unexpected Stage 1 paths: {unexpected}')
          protected = {'model.py', 'train.py', 'sample.py', 'configurator.py'}
          touched_protected = sorted(protected.intersection(changed))
          if touched_protected:
              raise SystemExit(f'Stage 1 touched protected runtime files: {touched_protected}')
          print('\n'.join(changed))
          PY

      - name: Compile Stage 1 Python sources
        run: |
          set -euo pipefail
          python -m compileall -q sheet tests

      - name: Run calibrated Stage 1 tests
        run: |
          set -euo pipefail
          mkdir -p evidence
          python tests/run_sheet_stage1_tests.py \
            --evidence evidence/stage1_math_calibration.json

      - name: Upload Stage 1 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage1-math-evidence
          path: evidence/stage1_math_calibration.json
          if-no-files-found: error
